[package]
name = "burst-frame-deduplicator"
version = "0.1.0"
edition = "2024"

[workspace]
members = [".", "crates/burst-core", "web/wasm"]
resolver = "3"

[features]
default = ["macos-native"]
macos-native = ["metal-accel", "macos-vision"]
metal-accel = ["dep:metal"]
macos-vision = ["dep:objc"]
gui = ["dep:eframe", "dep:rfd"]

[dependencies]
anyhow = "1.0"
axum = { version = "0.8", features = ["json"] }
burst-core = { path = "crates/burst-core" }
chrono = { version = "0.4", default-features = false, features = ["clock", "serde"] }
clap = { version = "4.5", features = ["derive"] }
csv = "1.4"
image = { version = "0.25", default-features = false, features = ["bmp", "gif", "jpeg", "png", "tiff", "webp"] }
jpeg-decoder = { version = "0.3.2", default-features = false }
kamadak-exif = "0.6"
mime_guess = "2.0"
metal = { version = "0.32", optional = true }
objc = { version = "0.2", optional = true }
open = "5.3"
parking_lot = "0.12"
rayon = "1.11"
regex = "1.11"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
sha1 = "0.10"
tempfile = "3.23"
tokio = { version = "1.48", features = ["macros", "rt-multi-thread", "signal", "sync"] }
walkdir = "2.5"
which = "8.0"

[target.'cfg(not(target_arch = "wasm32"))'.dependencies]
eframe = { version = "0.35", optional = true, default-features = false, features = ["accesskit", "default_fonts", "glow"] }
rfd = { version = "0.17", optional = true, default-features = false }
