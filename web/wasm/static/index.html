<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="">
  <title></title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./coi-serviceworker.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1 data-i18n="title"></h1>
      <div id="sourceLabel" class="source-label" data-i18n="browserMode"></div>
    </div>
    <div class="header-actions">
      <button type="button" id="tutorialBtn" class="icon-button utility-button">?</button>
      <button type="button" id="aboutBtn" class="icon-button utility-button">ⓘ</button>
      <details id="localeMenu" class="locale-menu">
        <summary aria-haspopup="menu">文/A</summary>
        <div class="locale-popover" role="menu">
          <button type="button" data-locale="en" role="menuitem"></button>
          <button type="button" data-locale="zh-CN" role="menuitem"></button>
        </div>
      </details>
      <button type="button" id="saveBtn" class="secondary" hidden data-i18n="saveReview"></button>
      <button type="button" id="pickBtn" class="primary" data-i18n="chooseFolder"></button>
      <input id="folderInput" type="file" webkitdirectory multiple hidden>
    </div>
  </header>

  <main>
    <section id="emptyState" class="empty-state">
      <button type="button" id="emptyPickBtn" class="folder-target">
        <span class="folder-icon" aria-hidden="true"></span>
        <strong data-i18n="chooseFolder"></strong>
        <span data-i18n="localOnly"></span>
      </button>
    </section>

    <section id="progressView" class="progress-view" hidden aria-live="polite">
      <div class="progress-heading">
        <div>
          <div id="stageLabel" class="stage-label"></div>
          <div id="progressDetail" class="progress-detail"></div>
        </div>
        <button type="button" id="cancelBtn" class="secondary" data-i18n="cancel"></button>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div id="progressBar"></div>
      </div>
      <div id="progressPercent" class="progress-percent">0%</div>
    </section>

    <section id="reviewView" hidden>
      <div id="stats" class="stats"></div>
      <div class="review-toolbar">
        <input id="searchInput" type="search" data-i18n-placeholder="findFilename">
        <select id="filterSelect">
          <option value="all" data-i18n="allFrames"></option>
          <option value="review" data-i18n="needsReview"></option>
          <option value="keep" data-i18n="kept"></option>
          <option value="reject" data-i18n="rejected"></option>
          <option value="moved" data-i18n="moved"></option>
          <option value="multi" data-i18n="multiStacks"></option>
        </select>
      </div>
      <div id="stacks" class="stacks"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden role="status"></div>

  <dialog id="aboutDialog" class="info-dialog">
    <div class="dialog-shell">
      <header class="dialog-header">
        <div>
          <h2 id="aboutDialogTitle"></h2>
          <p id="aboutDescription"></p>
        </div>
        <button type="button" id="closeAboutBtn" class="icon-button">×</button>
      </header>
      <a id="githubLink" class="repository-link" href="https://github.com/pan2013e/burst-frame-deduplicator" target="_blank" rel="noreferrer"></a>
      <section>
        <h3 id="diagnosticsTitle"></h3>
        <dl id="diagnosticsList" class="diagnostics-list"></dl>
      </section>
    </div>
  </dialog>

  <dialog id="tutorialDialog" class="tutorial-dialog" data-step="0">
    <div class="dialog-shell tutorial-shell">
      <header class="tutorial-heading">
        <strong id="tutorialLabel"></strong>
        <span id="tutorialProgress"></span>
      </header>
      <div class="tutorial-demo" aria-hidden="true">
        <div class="tutorial-source"><span>▣</span><b id="tutorialDemoSource"></b></div>
        <div class="tutorial-frames">
          <div class="tutorial-frame reject"><span>✈</span><b id="tutorialDemoReject"></b><i style="--quality: 42%"></i></div>
          <div class="tutorial-frame keep"><span>✈</span><b id="tutorialDemoKeep"></b><i style="--quality: 91%"></i></div>
          <div class="tutorial-frame review"><span>✈</span><b id="tutorialDemoReview"></b><i style="--quality: 68%"></i></div>
        </div>
        <div class="tutorial-safe-move"><span>▣</span><span>→</span><span>⇩</span><span>↶</span></div>
      </div>
      <div>
        <h2 id="tutorialTitle"></h2>
        <p id="tutorialBody"></p>
      </div>
      <footer class="dialog-actions">
        <button type="button" id="tutorialSkip" class="secondary"></button>
        <span class="action-spacer"></span>
        <button type="button" id="tutorialBack" class="secondary"></button>
        <button type="button" id="tutorialNext" class="primary"></button>
      </footer>
    </div>
  </dialog>

  <div id="viewer" class="viewer" hidden aria-hidden="true" tabindex="-1">
    <div class="viewer-bar">
      <div id="viewerTitle" class="viewer-title"></div>
      <label class="viewer-keep"><input id="viewerKeep" type="checkbox"> <span data-i18n="keep"></span></label>
      <button type="button" id="zoomOutBtn">−</button>
      <button type="button" id="zoomInBtn">+</button>
      <button type="button" id="fitBtn" data-i18n="fit"></button>
      <button type="button" id="closeViewerBtn" data-i18n="close"></button>
    </div>
    <div id="viewerViewport" class="viewer-viewport">
      <img id="viewerImage" alt="">
      <div id="viewerLoading" class="viewer-loading"><span></span><b data-i18n="loading"></b></div>
      <div id="viewerError" class="viewer-error" hidden></div>
    </div>
  </div>

  <dialog id="saveDialog" class="save-dialog">
    <div class="dialog-shell">
      <header class="dialog-header">
        <div>
          <h2 data-i18n="saveModalTitle"></h2>
          <p data-i18n="saveModalSubtitle"></p>
        </div>
        <button type="button" id="closeSaveBtn" class="icon-button" data-i18n-aria="close">×</button>
      </header>
      <div id="saveStats" class="save-stats"></div>
      <div id="operationStatus" class="operation-status" hidden></div>
      <section class="destination-section">
        <strong data-i18n="moveDestinationLabel"></strong>
        <div class="destination-row">
          <span id="destinationName" data-i18n="chooseMoveDestination"></span>
          <button type="button" id="chooseDestinationBtn" class="secondary" data-i18n="choose"></button>
        </div>
      </section>
      <section class="script-section">
        <div class="script-toolbar">
          <div class="tabs" role="tablist">
            <button type="button" id="posixTab" role="tab" data-script="posix" data-i18n="macLinuxTab"></button>
            <button type="button" id="powershellTab" role="tab" data-script="powershell" data-i18n="windowsTab"></button>
          </div>
          <button type="button" id="copyScriptBtn" class="secondary" data-i18n="copyScript"></button>
        </div>
        <pre id="scriptCode" tabindex="0"></pre>
      </section>
      <footer class="dialog-actions">
        <button type="button" id="exportJsonBtn" class="secondary" data-i18n="exportReviewJson"></button>
        <span class="action-spacer"></span>
        <button type="button" id="restoreMovedBtn" class="secondary" data-i18n="restoreMoved" hidden></button>
        <button type="button" id="moveRejectedBtn" class="danger"></button>
      </footer>
    </div>
  </dialog>

  <dialog id="confirmDialog" class="confirm-dialog">
    <form method="dialog" class="dialog-shell compact">
      <h2 id="confirmTitle"></h2>
      <p id="confirmMessage"></p>
      <footer class="dialog-actions">
        <button type="submit" value="cancel" class="secondary" data-i18n="cancel"></button>
        <span class="action-spacer"></span>
        <button type="submit" value="confirm" id="confirmAction" class="danger"></button>
      </footer>
    </form>
  </dialog>

  <script type="module" src="./app.js"></script>
</body>
</html>
