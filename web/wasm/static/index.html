<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="color-scheme" content="light dark">
  <meta name="description" content="Cull burst photos without losing control.">
  <title>Burst Frame Deduplicator</title>
  <link rel="stylesheet" href="./styles.css">
  <script src="./coi-serviceworker.js"></script>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <h1 data-i18n="title">Burst Frame Deduplicator</h1>
      <div id="sourceLabel" class="source-label" data-i18n="browserMode">Browser mode</div>
    </div>
    <div class="header-actions">
      <div class="locale-switch" role="group" aria-label="Language">
        <button type="button" data-locale="en">English</button>
        <button type="button" data-locale="zh-CN">简体中文</button>
      </div>
      <button type="button" id="saveBtn" class="secondary" hidden data-i18n="saveReview">Save review</button>
      <button type="button" id="pickBtn" class="primary" data-i18n="chooseFolder">Choose photo folder</button>
      <input id="folderInput" type="file" webkitdirectory multiple hidden>
    </div>
  </header>

  <main>
    <section id="emptyState" class="empty-state">
      <button type="button" id="emptyPickBtn" class="folder-target">
        <span class="folder-icon" aria-hidden="true"></span>
        <strong data-i18n="chooseFolder">Choose photo folder</strong>
        <span data-i18n="localOnly">Photos stay on this device</span>
      </button>
    </section>

    <section id="progressView" class="progress-view" hidden aria-live="polite">
      <div class="progress-heading">
        <div>
          <div id="stageLabel" class="stage-label"></div>
          <div id="progressDetail" class="progress-detail"></div>
        </div>
        <button type="button" id="cancelBtn" class="secondary" data-i18n="cancel">Cancel</button>
      </div>
      <div class="progress-track" role="progressbar" aria-valuemin="0" aria-valuemax="100">
        <div id="progressBar"></div>
      </div>
      <div id="progressPercent" class="progress-percent">0%</div>
    </section>

    <section id="reviewView" hidden>
      <div id="stats" class="stats"></div>
      <div class="review-toolbar">
        <input id="searchInput" type="search" data-i18n-placeholder="findFilename" placeholder="Find filename">
        <select id="filterSelect" aria-label="Filter">
          <option value="all" data-i18n="allFrames">All frames</option>
          <option value="review" data-i18n="needsReview">Needs review</option>
          <option value="keep" data-i18n="kept">Kept</option>
          <option value="reject" data-i18n="rejected">Rejected</option>
          <option value="multi" data-i18n="multiStacks">Multi-frame stacks</option>
        </select>
      </div>
      <div id="stacks" class="stacks"></div>
    </section>
  </main>

  <div id="toast" class="toast" hidden role="status"></div>

  <div id="viewer" class="viewer" hidden aria-hidden="true" tabindex="-1">
    <div class="viewer-bar">
      <div id="viewerTitle" class="viewer-title"></div>
      <label class="viewer-keep"><input id="viewerKeep" type="checkbox"> <span data-i18n="keep">Keep</span></label>
      <button type="button" id="zoomOutBtn" title="Zoom out" aria-label="Zoom out">−</button>
      <button type="button" id="zoomInBtn" title="Zoom in" aria-label="Zoom in">+</button>
      <button type="button" id="fitBtn" data-i18n="fit">Fit</button>
      <button type="button" id="closeViewerBtn" data-i18n="close">Close</button>
    </div>
    <div id="viewerViewport" class="viewer-viewport">
      <img id="viewerImage" alt="">
      <div id="viewerLoading" class="viewer-loading"><span></span><b data-i18n="loading">Loading preview</b></div>
      <div id="viewerError" class="viewer-error" hidden></div>
    </div>
  </div>

  <script type="module" src="./app.js"></script>
</body>
</html>
